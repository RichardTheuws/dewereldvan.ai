{% extends "base.html" %}
{% block title %}dewereldvan.ai — ledenplatform{% endblock %}
{% block content %}
<section class="text-center py-12">
  <h1 class="text-4xl font-bold tracking-tight text-slate-900">De wereld van ons</h1>
  <p class="mt-4 max-w-2xl mx-auto text-lg text-slate-600">
    Een plek voor de leden van onze groep om te laten zien wie ze zijn,
    wat ze maken en waar ze naar op zoek zijn.
  </p>
  <div class="mt-8 flex items-center justify-center gap-4">
    <a href="/register" class="rounded-md bg-emerald-600 px-5 py-2.5 text-white font-medium hover:bg-emerald-700">
      Word lid
    </a>
    <a href="/login" class="rounded-md border border-slate-300 px-5 py-2.5 font-medium hover:bg-white">
      Inloggen
    </a>
  </div>
</section>
{% endblock %}
