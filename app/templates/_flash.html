{# Flash/error partial. FEATURES sets request.session["flash"] = {"kind": "...", "text": "..."} #}
{% set flash = request.session.pop("flash", None) if request.session else None %}
{% if flash %}
  {% set kind = flash.kind | default("info") %}
  <div class="mb-6 rounded-md border px-4 py-3 text-sm
    {% if kind == 'error' %}border-red-200 bg-red-50 text-red-800
    {% elif kind == 'success' %}border-emerald-200 bg-emerald-50 text-emerald-800
    {% else %}border-slate-200 bg-white text-slate-700{% endif %}">
    {{ flash.text }}
  </div>
{% endif %}
