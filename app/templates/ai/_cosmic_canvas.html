{# Living constellation canvas + entrance choreography. Reused from the teaser.
   Honours prefers-reduced-motion (static single paint, no loop). Targets the
   #stars canvas and toggles `.ready` on <body class="cosmic"> for [data-reveal]. #}
<script>
(function () {
  var body = document.body;
  requestAnimationFrame(function () {
    requestAnimationFrame(function () { body.classList.add('ready'); });
  });

  var canvas = document.getElementById('stars');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var w, h, dpr, stars = [], mouse = { x: .5, y: .5 };
  var reduce = window.matchMedia('(prefers-reduced-motion:reduce)').matches;

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    w = canvas.width = innerWidth * dpr; h = canvas.height = innerHeight * dpr;
    canvas.style.width = innerWidth + 'px'; canvas.style.height = innerHeight + 'px';
    var count = Math.min(150, Math.floor(innerWidth * innerHeight / 12000));
    stars = Array.from({ length: count }, function () {
      var gold = Math.random() < 0.10;
      return {
        x: Math.random() * w, y: Math.random() * h,
        z: Math.random() * 0.8 + 0.2,
        r: (Math.random() * 1.3 + 0.4) * dpr * (gold ? 1.8 : 1),
        vx: (Math.random() - .5) * 0.06 * dpr, vy: (Math.random() - .5) * 0.06 * dpr,
        tw: Math.random() * Math.PI * 2, gold: gold
      };
    });
  }
  resize(); addEventListener('resize', resize);
  addEventListener('mousemove', function (e) { mouse.x = e.clientX / innerWidth; mouse.y = e.clientY / innerHeight; });

  var LINK = 110 * dpr;
  function frame(t) {
    ctx.clearRect(0, 0, w, h);
    var px = (mouse.x - .5), py = (mouse.y - .5), i, j;
    for (i = 0; i < stars.length; i++) {
      var s = stars[i]; s.x += s.vx; s.y += s.vy;
      if (s.x < 0) s.x = w; if (s.x > w) s.x = 0; if (s.y < 0) s.y = h; if (s.y > h) s.y = 0;
    }
    for (i = 0; i < stars.length; i++) {
      var a = stars[i];
      var ax = a.x + px * 40 * dpr * a.z, ay = a.y + py * 40 * dpr * a.z;
      for (j = i + 1; j < stars.length; j++) {
        var b = stars[j];
        var bx = b.x + px * 40 * dpr * b.z, by = b.y + py * 40 * dpr * b.z;
        var dx = ax - bx, dy = ay - by, d = Math.hypot(dx, dy);
        if (d < LINK) {
          var o = (1 - d / LINK) * 0.22;
          ctx.strokeStyle = 'rgba(140,160,255,' + o + ')';
          ctx.lineWidth = dpr * 0.5;
          ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(bx, by); ctx.stroke();
        }
      }
    }
    for (i = 0; i < stars.length; i++) {
      var st = stars[i];
      var sx = st.x + px * 40 * dpr * st.z, sy = st.y + py * 40 * dpr * st.z;
      var tw = 0.55 + 0.45 * Math.sin(t * 0.001 + st.tw);
      ctx.beginPath(); ctx.arc(sx, sy, st.r, 0, Math.PI * 2);
      if (st.gold) {
        ctx.fillStyle = 'rgba(246,205,134,' + tw + ')';
        ctx.shadowColor = 'rgba(246,205,134,.9)'; ctx.shadowBlur = 10 * dpr;
      } else {
        ctx.fillStyle = 'rgba(225,232,255,' + (0.5 * tw) + ')';
        ctx.shadowBlur = 0;
      }
      ctx.fill(); ctx.shadowBlur = 0;
    }
    if (!reduce) requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
