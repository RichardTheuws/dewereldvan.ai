{# A single existing offering/need <li> rendered in the edit-page loop.
   `kind` is "offering" or "need"; `item` is the Offering/Need object. #}
<li id="{{ kind }}-{{ item.id }}" class="flex items-start justify-between gap-3 rounded border border-slate-200 bg-white px-3 py-2">
  <div>
    <p class="text-sm font-medium text-slate-800">{{ item.title }}</p>
    {% if item.description %}
    <p class="text-xs text-slate-500">{{ item.description }}</p>
    {% endif %}
  </div>
  <button type="button"
          class="text-xs text-red-600 hover:underline"
          hx-delete="/profiel/{{ kind }}/{{ item.id }}"
          hx-target="#{{ kind }}-{{ item.id }}"
          hx-swap="outerHTML"
          hx-confirm="Dit item verwijderen?">
    Verwijderen
  </button>
</li>
