# Alembic configuration. The database URL is supplied at runtime from
# app.config.settings (env-driven) in alembic/env.py — not hard-coded here.

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
# sqlalchemy.url is intentionally left blank; env.py sets it from settings.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
