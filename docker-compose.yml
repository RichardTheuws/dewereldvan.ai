# Begrens de Docker json-file logs zodat ze onder publieke traffic niet onbeperkt
# groeien en de (gedeelde) M4-schijf vol laten lopen. Per service via de anchor.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  web:
    build: .
    env_file: .env
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    # No host port published — only reachable via cloudflared on the compose network.
    expose:
      - "8000"
    volumes:
      - outbox:/app/data

  postgres:
    image: postgres:16
    logging: *default-logging
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: dewereldvan
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d dewereldvan"]
      interval: 10s
      timeout: 5s
      retries: 5

  cloudflared:
    image: cloudflare/cloudflared:latest
    logging: *default-logging
    # --protocol http2: forceer TCP-transport i.p.v. QUIC. De kernel-UDP-buffer in de
    # Docker-Desktop-VM is te klein (cloudflared logt "failed to sufficiently increase
    # receive buffer size", krijgt 416 KiB i.p.v. 7168 KiB) → QUIC wordt instabiel onder
    # bursts en dropt periodiek alle tunnelverbindingen ("no recent network activity"),
    # ~15-20s 502 per keer. HTTP/2 over TCP omzeilt het UDP-buffer-probleem volledig.
    command: tunnel --no-autoupdate --protocol http2 run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}   # OPERATOR SUPPLIES — do NOT invent. Empty in repo.
    depends_on:
      - web
    restart: unless-stopped

volumes:
  pgdata:
  outbox:
